<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      /* Surfaces — cool near-black stack */
      --bg-0: #08090f;
      --bg-1: #0d0e1a;
      --bg-2: #131525;
      --bg-3: #1a1c30;
      --bg-4: #21233b;

      /* Borders */
      --border-faint:  rgba(255,255,255,0.03);
      --border-dim:    rgba(255,255,255,0.07);
      --border-base:   rgba(255,255,255,0.11);
      --border-strong: rgba(255,255,255,0.18);

      /* Accent — Indigo */
      --accent:         #6366f1;
      --accent-hi:      #818cf8;
      --accent-lo:      #4f46e5;
      --accent-muted:   rgba(99,102,241,0.10);
      --accent-glow:    rgba(99,102,241,0.24);
      --accent-ring:    rgba(99,102,241,0.38);
      --accent-border:  rgba(99,102,241,0.42);
      --accent-grad:    linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);

      /* Semantic */
      --danger:        #f43f5e;
      --danger-muted:  rgba(244,63,94,0.10);
      --success:       #22c55e;
      --warning:       #f59e0b;

      /* Text */
      --text-1: #f0f1f8;
      --text-2: #9ea3c4;
      --text-3: #4e5280;
      --text-4: #2d3060;

      /* Shadows */
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.5);
      --shadow-md:    0 4px 20px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4);
      --shadow-focus: 0 0 0 2.5px var(--accent-glow);
      --shadow-btn:   0 2px 10px var(--accent-glow);

      /* Motion */
      --ease:   cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --t-fast: 110ms;
      --t-base: 175ms;
      --t-slow: 280ms;

      /* Geometry */
      --r-xs:   4px;
      --r-sm:   7px;
      --r-md:   10px;
      --r-lg:   14px;
      --r-xl:   20px;
      --r-full: 9999px;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 100%; height: 100%; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Base ───────────────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-feature-settings: 'ss01';
      background: var(--bg-0);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Shared SVG icon base */
    .icon {
      display: block;
      flex-shrink: 0;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Tab Bar ────────────────────────────────────────────────── */
    #tab-bar {
      display: flex;
      align-items: stretch;
      min-height: 38px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-dim);
      padding: 5px 4px 0;
      flex-shrink: 0;
      position: relative;
    }

    /* Overflow fade mask */
    #tab-bar::after {
      content: '';
      position: absolute;
      right: 34px; top: 0; bottom: 0;
      width: 32px;
      background: linear-gradient(to right, transparent, var(--bg-1));
      pointer-events: none;
      z-index: 2;
    }

    #tabs {
      display: flex;
      align-items: flex-end;
      flex: 1;
      min-width: 0;
      gap: 1px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      padding-right: 4px;
    }
    #tabs::-webkit-scrollbar { display: none; }

    /* ── Individual Tab ─────────────────────────────────────────── */
    .tab {
      position: relative;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 4px 0 8px;
      min-width: 80px;
      max-width: 160px;
      height: 29px;
      border-radius: var(--r-sm) var(--r-sm) 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      transition:
        background var(--t-fast) var(--ease),
        border-color var(--t-fast) var(--ease);
      animation: tab-appear var(--t-base) var(--spring) both;
    }
    @keyframes tab-appear {
      from { opacity: 0; transform: translateY(4px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tab:hover { background: var(--bg-2); border-color: var(--border-faint); }

    .tab.active {
      background: var(--bg-0);
      border-color: var(--border-dim);
      border-bottom-color: var(--bg-0);
      z-index: 1;
    }

    /* Gradient accent bar on active tab */
    .tab.active::before {
      content: '';
      position: absolute;
      top: -1px; left: 10px; right: 10px;
      height: 2px;
      background: var(--accent-grad);
      border-radius: 0 0 var(--r-full) var(--r-full);
    }

    /* Ambient radial glow under active tab accent */
    .tab.active::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(ellipse at 50% 0%, var(--accent-muted) 0%, transparent 72%);
      pointer-events: none;
    }

    .tab-favicon {
      flex-shrink: 0;
      width: 14px; height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-4);
      position: relative;
      z-index: 1;
    }
    .tab-favicon img {
      width: 14px; height: 14px;
      border-radius: 3px;
      display: block;
    }

    .tab-title {
      position: relative;
      z-index: 1;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      letter-spacing: 0.005em;
      transition: color var(--t-fast) var(--ease);
    }
    .tab:hover .tab-title  { color: var(--text-2); }
    .tab.active .tab-title { color: var(--text-1); }

    .tab-close {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      width: 16px; height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: var(--r-xs);
      color: var(--text-3);
      opacity: 0;
      transition:
        opacity var(--t-fast) var(--ease),
        background var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease);
    }
    .tab:hover .tab-close,
    .tab.active .tab-close  { opacity: 1; }
    .tab-close:hover        { background: var(--danger-muted); color: var(--danger); }
    .tab-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; opacity: 1; }

    /* New tab button */
    #new-tab-btn {
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      width: 30px; height: 24px;
      border: none;
      background: transparent;
      color: var(--text-3);
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      margin-bottom: 3px;
      border-radius: var(--r-sm);
      transition:
        background var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease),
        transform var(--t-base) var(--spring);
    }
    #new-tab-btn:hover  { background: var(--bg-3); color: var(--text-1); }
    #new-tab-btn:active { transform: scale(0.86); }
    #new-tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Toolbar ────────────────────────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 9px 10px 8px;
      background: var(--bg-0);
      border-bottom: 1px solid var(--border-dim);
    }

    /* URL Row */
    #url-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #url-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
      display: flex;
      align-items: center;
    }

    #url-prefix {
      position: absolute;
      left: 11px;
      display: flex;
      align-items: center;
      color: var(--text-4);
      pointer-events: none;
      z-index: 1;
      transition: color var(--t-base) var(--ease);
    }
    #url-prefix.secure { color: var(--success); }

    #url-input {
      width: 100%;
      padding: 7px 30px 7px 30px;
      border-radius: var(--r-full);
      border: 1.5px solid var(--border-base);
      background: var(--bg-2);
      color: var(--text-1);
      font-size: 12px;
      font-family: inherit;
      font-weight: 400;
      letter-spacing: 0.01em;
      outline: none;
      transition:
        border-color var(--t-fast) var(--ease),
        box-shadow var(--t-fast) var(--ease),
        background var(--t-fast) var(--ease);
    }
    #url-input::placeholder { color: var(--text-4); }
    #url-input:hover  { border-color: var(--border-strong); background: var(--bg-3); }
    #url-input:focus  { border-color: var(--accent-border); box-shadow: var(--shadow-focus); background: var(--bg-3); }

    #clear-btn {
      position: absolute;
      right: 8px;
      display: none;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      border: none;
      border-radius: 50%;
      background: var(--bg-4);
      color: var(--text-3);
      transition:
        background var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease),
        transform var(--t-base) var(--spring);
    }
    #clear-btn:hover  { background: var(--border-strong); color: var(--text-1); }
    #clear-btn:active { transform: scale(0.84); }

    /* ── Toolbar Buttons ────────────────────────────────────────── */
    .tb-btn {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border: 1.5px solid var(--border-base);
      border-radius: var(--r-md);
      background: var(--bg-2);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        background var(--t-fast) var(--ease),
        border-color var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease),
        transform var(--t-base) var(--spring),
        box-shadow var(--t-fast) var(--ease);
    }
    .tb-btn:hover {
      background: var(--bg-3);
      border-color: var(--border-strong);
      color: var(--text-1);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .tb-btn:active   { transform: scale(0.88); box-shadow: none; }
    .tb-btn:disabled { opacity: 0.32; cursor: not-allowed; transform: none; box-shadow: none; }
    .tb-btn:focus-visible { outline: none; border-color: var(--accent-border); box-shadow: var(--shadow-focus); }

    /* Go button — accent filled */
    #go-btn {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-btn);
    }
    #go-btn:hover {
      background: var(--accent-hi);
      border-color: transparent;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    #go-btn:focus-visible { border-color: transparent; box-shadow: var(--shadow-focus); }

    /* Go button loading → stop state */
    #go-btn.is-stop {
      background: var(--bg-2);
      border-color: var(--border-strong);
      color: var(--danger);
      box-shadow: none;
    }
    #go-btn.is-stop:hover { background: var(--danger-muted); box-shadow: none; }

    /* Show/hide arrow vs stop icon */
    #go-btn .go-stop   { display: none; }
    #go-btn.is-stop .go-arrow { display: none; }
    #go-btn.is-stop .go-stop  { display: block; }

    /* Spin animation for refresh */
    @keyframes spin { to { transform: rotate(360deg); } }
    #refresh-btn.is-loading svg { animation: spin 0.7s linear infinite; }

    /* ── Presets Section ────────────────────────────────────────── */
    #presets-section { display: flex; flex-direction: column; gap: 6px; }

    #presets-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #presets-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-4);
    }

    #presets-toggle {
      display: flex;
      align-items: center;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--text-4);
      font-size: 10px;
      font-family: inherit;
      padding: 2px 5px;
      border-radius: var(--r-sm);
      transition:
        color var(--t-fast) var(--ease),
        background var(--t-fast) var(--ease);
    }
    #presets-toggle:hover { color: var(--text-2); background: var(--bg-2); }
    #presets-toggle svg   { transition: transform var(--t-base) var(--ease); }
    #presets-toggle.collapsed svg { transform: rotate(-90deg); }
    #presets-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Smooth collapse via CSS grid row trick */
    #presets-wrap {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      transition:
        grid-template-rows var(--t-slow) var(--ease),
        opacity var(--t-base) var(--ease);
      opacity: 1;
    }
    #presets-wrap.collapsed { grid-template-rows: 0fr; opacity: 0; }
    #presets-inner { overflow: hidden; }

    #presets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      padding-top: 1px;
    }

    /* ── Chips ──────────────────────────────────────────────────── */
    .chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 4px 7px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-dim);
      background: var(--bg-2);
      color: var(--text-3);
      font-size: 10px;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: 0.03em;
      white-space: nowrap;
      transition:
        background var(--t-fast) var(--ease),
        border-color var(--t-fast) var(--ease),
        color var(--t-fast) var(--ease),
        transform var(--t-base) var(--spring),
        box-shadow var(--t-fast) var(--ease);
    }
    .chip svg { width: 15px; height: 15px; }
    .chip:hover {
      background: var(--accent-muted);
      border-color: var(--accent-border);
      color: var(--text-1);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99,102,241,0.18);
    }
    .chip:active  { transform: translateY(0) scale(0.93); box-shadow: none; }
    .chip:focus-visible { outline: none; border-color: var(--accent); box-shadow: var(--shadow-focus); }

    /* ── Content Area ───────────────────────────────────────────── */
    #content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Loading Bar ────────────────────────────────────────────── */
    #loading-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
    }
    #loading-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 45%;
      background: var(--accent-grad);
      border-radius: var(--r-full);
      box-shadow: 0 0 8px var(--accent-glow);
      opacity: 0;
      transition: opacity var(--t-base) var(--ease);
    }
    #loading-bar.active::after {
      opacity: 1;
      animation: bar-sweep 1.5s cubic-bezier(0.4,0,0.6,1) infinite;
    }
    @keyframes bar-sweep {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(300%); }
    }

    /* ── Placeholder (New Tab Screen) ───────────────────────────── */
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      overflow: hidden;
      animation: fade-up var(--t-base) var(--ease) both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ambient glow sphere behind the icon */
    .placeholder::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -68%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 68%);
      pointer-events: none;
    }

    .placeholder-mark {
      position: relative;
      z-index: 1;
      width: 56px; height: 56px;
      border-radius: var(--r-xl);
      background: var(--bg-2);
      border: 1px solid var(--border-base);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--border-dim);
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-5px); }
    }
    .placeholder-mark svg { width: 26px; height: 26px; stroke: var(--text-3); }

    .placeholder-copy {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .placeholder-copy h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .placeholder-copy p {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.8;
    }

    .placeholder-shortcuts {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .shortcut {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      color: var(--text-4);
    }
    kbd {
      font-family: inherit;
      font-size: 9.5px;
      font-weight: 500;
      padding: 2px 7px;
      background: var(--bg-1);
      border: 1px solid var(--border-base);
      border-bottom-width: 2px;
      border-radius: var(--r-xs);
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    /* ── Iframe ─────────────────────────────────────────────────── */
    .tab-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }
    .tab-frame.active { display: block; }

    /* ── Status Bar ─────────────────────────────────────────────── */
    #status-bar {
      flex-shrink: 0;
      height: 22px;
      padding: 0 10px;
      background: var(--bg-1);
      border-top: 1px solid var(--border-faint);
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
    }
    #status-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      color: var(--text-4);
      transition: color var(--t-base) var(--ease);
    }
    #status-icon.secure  { color: var(--success); }
    #status-icon.warning { color: var(--warning); }
    #status-text {
      font-size: 10px;
      color: var(--text-4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

<!-- ══ Tab Bar ══════════════════════════════════════════════════ -->
<div id="tab-bar" role="tablist" aria-label="Browser tabs">
  <div id="tabs"></div>
  <button id="new-tab-btn" title="New tab (Ctrl+T)" aria-label="Open new tab">
    <svg class="icon" width="11" height="11" viewBox="0 0 24 24" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- ══ Toolbar ══════════════════════════════════════════════════ -->
<header id="toolbar">
  <div id="url-row">

    <!-- Back -->
    <button id="back-btn" class="tb-btn" title="Go back (Alt+←)" aria-label="Go back" disabled>
      <svg class="icon" width="13" height="13" viewBox="0 0 24 24" stroke-width="2.2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- URL bar -->
    <div id="url-wrap">
      <span id="url-prefix" aria-hidden="true">
        <svg class="icon" width="11" height="11" viewBox="0 0 24 24" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input
        id="url-input"
        type="text"
        placeholder="Search or enter a URL…"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        aria-label="Address bar"
      />
      <button id="clear-btn" title="Clear" aria-label="Clear address bar">
        <svg class="icon" width="8" height="8" viewBox="0 0 24 24" stroke-width="2.8">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Refresh -->
    <button id="refresh-btn" class="tb-btn" title="Reload (Ctrl+R)" aria-label="Reload page">
      <svg class="icon" width="13" height="13" viewBox="0 0 24 24" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>

    <!-- Go / Stop (icons toggled via CSS class) -->
    <button id="go-btn" class="tb-btn" title="Go (Enter)" aria-label="Navigate">
      <svg class="icon go-arrow" width="13" height="13" viewBox="0 0 24 24" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
      <svg class="icon go-stop" width="12" height="12" viewBox="0 0 24 24" stroke-width="0" fill="currentColor">
        <rect x="5" y="5" width="14" height="14" rx="2.5"/>
      </svg>
    </button>
  </div>

  <!-- Quick Access -->
  <div id="presets-section">
    <div id="presets-header">
      <span id="presets-label">Quick Access</span>
      <button id="presets-toggle" aria-expanded="true" aria-controls="presets-wrap">
        <svg class="icon" width="10" height="10" viewBox="0 0 24 24" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <div id="presets-wrap">
      <div id="presets-inner">
        <div id="presets" role="group" aria-label="Quick access sites">

          <button class="chip" data-url="https://www.google.com" title="Google">
            <svg class="icon" viewBox="0 0 24 24" stroke-width="1.75">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            Google
          </button>

          <button class="chip" data-url="https://docs.google.com/document" title="Google Docs">
            <svg class="icon" viewBox="0 0 24 24" stroke-width="1.75">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            Docs
          </button>

          <button class="chip" data-url="https://docs.google.com/spreadsheets" title="Google Sheets">
            <svg class="icon" viewBox="0 0 24 24" stroke-width="1.75">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
            </svg>
            Sheets
          </button>

          <button class="chip" data-url="https://chatgpt.com" title="ChatGPT">
            <svg class="icon" viewBox="0 0 24 24" stroke-width="1.75">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            ChatGPT
          </button>

          <button class="chip" data-url="https://claude.ai" title="Claude">
            <svg class="icon" viewBox="0 0 24 24" stroke-width="1.75">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Claude
          </button>

        </div>
      </div>
    </div>
  </div>
</header>
